# mise configuration for runtime version management
# https://mise.jdx.dev/configuration.html

[tools]
"npm:@biomejs/biome" = "2.4.10"
"npm:@bufbuild/buf" = "1.66.1"
"npm:@google/gemini-cli" = "0.35.3"
"npm:@openai/codex" = "0.129.0"
"npm:bun" = "1.3.11"
"npm:@ast-grep/cli" = "0.42.0"
"npm:pnpm" = "10.33.3"
delta = "0.19.2"
lazygit = "0.60.0"
go = "1.26.1"
node = "24.11.1"
usage = "3.2.0"
watchexec = "2.5.1"
python = "3.14.3"
chezmoi = "2.70.0"
gcloud = "566.0.0"

# === Homebrew から移行 ===
# Core development tools
deno = "2.7.9"
ghq = "1.9.4"

# Text processing & file operations
bat = "0.26.1"
eza = "0.23.4"
ripgrep = "15.1.0"
fzf = "0.70.0"
jq = "1.8.1"
# tokei = "latest"

# Development environment
neovim = "0.12.0"

# Build tools
protoc = "34.1"

# Code quality & DevOps
# pre-commit = "latest"
shellcheck = "0.11.0"
cmake = "4.3.1"

# Cloud & infrastructure
awscli = "2.34.20"
kubectl = "1.35.3"

# Network tools
xh = "0.25.3"

# Zsh plugin manager
"aqua:rossmacarthur/sheldon" = "0.8.5"

# Git worktree management
"github:max-sixty/worktrunk" = "0.33.0"
"aqua:jj-vcs/jj" = "0.39.0"
"npm:ccstatusline" = "2.2.2"
"npm:@playwright/cli" = "0.1.1"
yazi = "26.1.22"
yq = "4.52.5"
"npm:difit" = "4.0.2"
"github:k1LoW/mo" = "0.23.3"

[settings]
# Always pin exact versions when using `mise use`
pin = true
# Lock resolved versions in mise.lock file
lockfile = true
# Enable legacy version files (.node-version, .python-version, etc.)
legacy_version_file = true
# Always keep downloads to avoid re-downloading
always_keep_download = true
# Enable idiomatic version file support for Python tools
idiomatic_version_file_enable_tools = ["python"]
experimental = true
